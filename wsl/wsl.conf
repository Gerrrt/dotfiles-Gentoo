# dotfiles-Gentoo/wsl/wsl.conf
# Installed to /etc/wsl.conf on WSL by bootstrap.sh (with __WSL_USER__ filled in).
# Apply changes from a Windows terminal:  wsl.exe --shutdown  then reopen.
# NOTE: --shutdown restarts ALL your WSL distros.
#
# Gentoo defaults to OpenRC, so there's no [boot] systemd=true here. If you
# specifically run the systemd profile (sys-apps/systemd as init), you can add:
#   [boot]
#   systemd=true

[user]
# Land in this user (not root) on launch.
default=__WSL_USER__

[interop]
# Keep Windows interop on — lets clip.exe / explorer.exe / powershell.exe work
# from inside WSL (the pbcopy/pbpaste shim depends on it).
enabled=true
appendWindowsPath=true

[network]
generateResolvConf=true
